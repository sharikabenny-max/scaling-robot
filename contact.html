<header class="site-header">
  <nav class="nav-pill wrap" style="max-width:1180px;">
    <a href="index.html" class="logo">Sharika<span class="dot">.</span></a>

    <button class="nav-toggle">MENU</button>
  </nav>

<div class="pin-card" style="max-width:460px;">
  <span class="tape"></span>

  <form action="https://formsubmit.co/sharikabenny@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New Portfolio Contact Form">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="https://sharikabenny.me/thankyou.html">

    <div class="form-field">
      <label for="c-name">Your name</label>
      <input type="text" id="c-name" name="name" placeholder="Jordan Lee" required>
    </div>

    <div class="form-field">
      <label for="c-email">Your email</label>
      <input type="email" id="c-email" name="email" placeholder="jordan@email.com" required>
    </div>

    <div class="form-field">
      <label for="c-reason">This is about</label>
      <select id="c-reason" name="reason">
        <option>Freelance project</option>
        <option>Full-time role</option>
        <option>A piece from the shop</option>
        <option>Something else</option>
      </select>
    </div>

    <div class="form-field">
      <label for="c-message">Message</label>
      <textarea id="c-message" name="message"
        placeholder="Tell me a bit about what you have in mind..."
        required></textarea>
    </div>

    <button type="submit" class="btn btn-primary btn-block">
      Send message
    </button>

  </form>
</div>
